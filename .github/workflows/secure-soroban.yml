name: SecureSoroban — Security Gate

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  hardcoded-scan:
    name: Hardcoded Attack Simulation
    runs-on: ubuntu-latest
    outputs:
      blocked: ${{ steps.scan.outputs.blocked }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Stellar CLI
        run: |
          curl -fsSL https://github.com/stellar/stellar-cli/raw/main/install.sh | sh -s -- --install-deps
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          stellar --version
      - run: rustup target add wasm32v1-none
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            vulnerable_contracts/escrow/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - run: cd vulnerable_contracts/escrow && stellar contract build
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests
      - name: Run hardcoded scan
        id: scan
        continue-on-error: true
        env:
          VICTIM_SECRET:          ${{ secrets.VICTIM_SECRET }}
          ATTACKER_SECRET:        ${{ secrets.ATTACKER_SECRET }}
          VICTIM_ADDRESS:         "GAPJOEEWW4Y5ASHLRB2XAF6LDVHN5GJQFW4VZDPRDR5JODR3ZNYBFJQD"
          ATTACKER_ADDRESS:       "GBLUFMJRRZBU7TYPP2KKUCTCFCKIPNYA7ELBRLXTOLOQGY3ZFT3GJA4K"
          TOKEN_ID:               "CDLZFC3SYJYDZT7K67VZ75HPJVIEUVNIXF47ZG2FB2RMQQVU2HHGCYSC"
          AUTH_CONTRACT_ID:       "CBTJ2VU3VJM3WZU3TZTA6ZVGAEFRUUW6WPCIOCD7DNKL4LPLWW536ZUE"
          DRAIN_CONTRACT_ID:      "CCWEK7ILZYTSCOFMQEQJY5SISXFAXJKM7WGT7247YAMZZYVT2WL2YZ5Z"
          OVERFLOW_CONTRACT_ID:   "CCPN3X25DKVUCIYHUTMUM4YI5LZBGOUHQ6VDDVXBNZ32WM7YIHJXTWLJ"
          REENTRANCY_CONTRACT_ID: "CCC5TMGGNHVQG2PH7PZ3BBLQKKBPAEJICGETSRJ7QNJUYEB7R5N4NDGV"
          STELLAR_NETWORK:        "testnet"
          CONTRACTS_PATH:         "vulnerable_contracts/escrow/contracts"
        run: python3 scripts/run_all.py
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: hardcoded-reports
          path: scripts/*.json

  ai-scan:
    name: AI Agent Attack Simulation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests
      - name: Install Stellar CLI
        run: |
          curl -fsSL https://github.com/stellar/stellar-cli/raw/main/install.sh | sh -s -- --install-deps
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      - name: Cache Ollama binary and models
        id: cache-ollama
        uses: actions/cache@v4
        with:
          path: |
            ~/.ollama
            /usr/local/bin/ollama
            /usr/local/lib/ollama
          key: ${{ runner.os }}-ollama-full-qwen2.5-coder-7b-v2
          restore-keys: |
            ${{ runner.os }}-ollama-full-
      
      - name: Install Ollama
        if: steps.cache-ollama.outputs.cache-hit != 'true'
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ls /usr/local/lib/ollama/

      - name: Start Ollama
        run: |
          ollama serve &
          for i in $(seq 1 30); do
            curl -s http://localhost:11434/api/tags && break
            sleep 2
          done
      - name: Pull model
        if: steps.cache-ollama.outputs.cache-hit != 'true'
        run: ollama pull qwen2.5-coder:7b
      - name: Run AI agent
        continue-on-error: true
        timeout-minutes: 8
        env:
          VICTIM_SECRET:    ${{ secrets.VICTIM_SECRET }}
          ATTACKER_SECRET:  ${{ secrets.ATTACKER_SECRET }}
          VICTIM_ADDRESS:   "GAPJOEEWW4Y5ASHLRB2XAF6LDVHN5GJQFW4VZDPRDR5JODR3ZNYBFJQD"
          ATTACKER_ADDRESS: "GBLUFMJRRZBU7TYPP2KKUCTCFCKIPNYA7ELBRLXTOLOQGY3ZFT3GJA4K"
          TOKEN_ID:         "CDLZFC3SYJYDZT7K67VZ75HPJVIEUVNIXF47ZG2FB2RMQQVU2HHGCYSC"
          AUTH_CONTRACT_ID: "CBTJ2VU3VJM3WZU3TZTA6ZVGAEFRUUW6WPCIOCD7DNKL4LPLWW536ZUE"
          STELLAR_NETWORK:  "testnet"
          CONTRACTS_PATH:   "vulnerable_contracts/escrow/contracts"
        run: python3 scripts/ai_agent_attacker.py
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ai-agent-report
          path: scripts/ai_agent_report.json