name: 🛡️ Stellar Shield Security Scan

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  security-scan:
    name: Authorization Bypass Detection
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ⭐ Install Stellar CLI
        run: |
          curl -fsSL https://github.com/stellar/stellar-cli/raw/main/install.sh | sh -s -- --install-deps
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: 🦀 Add WASM target
        run: |
          rustup target add wasm32v1-none

      - name: 💾 Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            vulnerable_contracts/escrow/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: 🏗️ Build Soroban contract
        run: |
          cd vulnerable_contracts/escrow
          stellar contract build

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 🔑 Set up Stellar accounts
        env:
          VICTIM_SECRET: ${{ secrets.VICTIM_SECRET }}
          ATTACKER_SECRET: ${{ secrets.ATTACKER_SECRET }}
        run: |
          echo "$VICTIM_SECRET" | stellar keys add victim --secret-key -
          echo "$ATTACKER_SECRET" | stellar keys add attacker --secret-key -
      - name: 🚀 Deploy vulnerable contract
        run: |
          CONTRACT_ID=$(stellar contract deploy \
            --wasm vulnerable_contracts/escrow/target/wasm32v1-none/release/hello_world.wasm \
            --source victim \
            --network testnet)
          echo "CONTRACT_ID=$CONTRACT_ID" >> $GITHUB_ENV
          echo "Deployed: $CONTRACT_ID"

      - name: 🔍 Run Stellar Shield security scan
        env:
          CONTRACT_ID: ${{ env.CONTRACT_ID }}
        run: |
          cd scripts
          python3 detect_auth_bypass.py

      - name: 📊 Upload security report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stellar-shield-report
          path: scripts/report.json

      - name: 💬 Post report to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('scripts/report.json', 'utf8'));
            const status = report.detected ? '❌ BLOCKED' : '✅ SAFE TO DEPLOY';
            const body = `
            ## 🛡️ Stellar Shield Security Report
            | Field | Value |
            |-------|-------|
            | Vulnerability | ${report.vulnerability} |
            | Severity | ${report.severity} |
            | Funds At Risk | ${report.funds_at_risk_xlm} XLM |
            | Estimated Loss | $${report.estimated_loss_usd} USD |
            | Status | ${status} |
            
            **Fix:** ${report.fix}
            `;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });