name: Stellar Shield Security Scan

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  security-scan:
    name: Full Attack Simulation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Stellar CLI
        run: |
          curl -fsSL https://github.com/stellar/stellar-cli/raw/main/install.sh | sh -s -- --install-deps
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Add WASM target
        run: rustup target add wasm32v1-none

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            vulnerable_contracts/escrow/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build all contracts
        run: |
          cd vulnerable_contracts/escrow
          stellar contract build

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run full security scan
        continue-on-error: true
        env:
          VICTIM_SECRET:          ${{ secrets.VICTIM_SECRET }}
          ATTACKER_SECRET:        ${{ secrets.ATTACKER_SECRET }}
          VICTIM_ADDRESS:         "GAPJOEEWW4Y5ASHLRB2XAF6LDVHN5GJQFW4VZDPRDR5JODR3ZNYBFJQD"
          ATTACKER_ADDRESS:       "GBLUFMJRRZBU7TYPP2KKUCTCFCKIPNYA7ELBRLXTOLOQGY3ZFT3GJA4K"
          TOKEN_ID:               "CDLZFC3SYJYDZT7K67VZ75HPJVIEUVNIXF47ZG2FB2RMQQVU2HHGCYSC"
          AUTH_CONTRACT_ID:       "CBTJ2VU3VJM3WZU3TZTA6ZVGAEFRUUW6WPCIOCD7DNKL4LPLWW536ZUE"
          DRAIN_CONTRACT_ID:      "CCWEK7ILZYTSCOFMQEQJY5SISXFAXJKM7WGT7247YAMZZYVT2WL2YZ5Z"
          OVERFLOW_CONTRACT_ID:   "CCPN3X25DKVUCIYHUTMUM4YI5LZBGOUHQ6VDDVXBNZ32WM7YIHJXTWLJ"
          REENTRANCY_CONTRACT_ID: "CCC5TMGGNHVQG2PH7PZ3BBLQKKBPAEJICGETSRJ7QNJUYEB7R5N4NDGV"
          STELLAR_NETWORK:        "testnet"
          CONTRACTS_PATH:         "vulnerable_contracts/escrow/contracts"
        run: python3 scripts/run_all.py

      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stellar-shield-reports
          path: |
            scripts/report.json
            scripts/drain_report.json
            scripts/overflow_report.json
            scripts/reentrancy_report.json
            scripts/static_report.json
            scripts/combined_report.json

      - name: Post report to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('scripts/combined_report.json', 'utf8'));
            const status = report.push_blocked ? 'BLOCKED' : 'SAFE TO DEPLOY';
            const checks = Object.entries(report.checks)
              .map(([key, val]) => `| ${key} | ${val.severity} | $${val.estimated_loss_usd} |`)
              .join('\n');
            const body = `
            ## Stellar Shield Security Report
            | Check | Severity | Est. Loss |
            |-------|----------|-----------|
            ${checks}
            **Total Funds At Risk:** $${report.total_loss_usd} USD
            **Push Status:** ${status}
            `;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Cache Ollama models
        uses: actions/cache@v4
        with:
          path: ~/.ollama
          key: ${{ runner.os }}-ollama-qwen2.5-coder-7b
          restore-keys: |
            ${{ runner.os }}-ollama-

      - name: Install and start Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve &
          echo "Waiting for Ollama to start..."
          for i in $(seq 1 30); do
            curl -s http://localhost:11434/api/tags && break
            sleep 2
          done
          echo "Ollama ready"

      - name: Pull qwen2.5-coder model
        run: |
          ollama pull qwen2.5-coder:7b
          echo "Model ready"

      - name: Run AI agent scan
        continue-on-error: true
        timeout-minutes: 10
        env:
          VICTIM_SECRET:    ${{ secrets.VICTIM_SECRET }}
          ATTACKER_SECRET:  ${{ secrets.ATTACKER_SECRET }}
          VICTIM_ADDRESS:   "GAPJOEEWW4Y5ASHLRB2XAF6LDVHN5GJQFW4VZDPRDR5JODR3ZNYBFJQD"
          ATTACKER_ADDRESS: "GBLUFMJRRZBU7TYPP2KKUCTCFCKIPNYA7ELBRLXTOLOQGY3ZFT3GJA4K"
          TOKEN_ID:         "CDLZFC3SYJYDZT7K67VZ75HPJVIEUVNIXF47ZG2FB2RMQQVU2HHGCYSC"
          AUTH_CONTRACT_ID: "CBTJ2VU3VJM3WZU3TZTA6ZVGAEFRUUW6WPCIOCD7DNKL4LPLWW536ZUE"
          STELLAR_NETWORK:  "testnet"
          CONTRACTS_PATH:   "vulnerable_contracts/escrow/contracts"
        run: python3 scripts/ai_agent_attacker.py

      - name: Enforce push block
        run: |
          python3 -c "
          import json, sys
          report = json.load(open('scripts/combined_report.json'))
          if report['push_blocked']:
              print('PUSH BLOCKED — vulnerabilities found')
              sys.exit(1)
          else:
              print('SAFE TO DEPLOY')
              sys.exit(0)
          "